<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLogistic | Distribució intel·ligent d'aliments</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Estils ràpids per al banner (copia els del codi anterior si no fas servir fitxer CSS) */
        :root { --primary: #e67e22; --dark: #2c3e50; --white: #ffffff; --transition: all 0.3s ease; }
        body { font-family: sans-serif; margin: 0; background: #fdfaf6; }
        .hero { background: linear-gradient(135deg, #e67e22, #2ecc71); color: white; padding: 100px 20px; text-align: center; }
        .btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; display: inline-block; }
        .cookie-banner { position: fixed; bottom: 0; width: 100%; background: var(--dark); color: white; padding: 20px; display: none; z-index: 1000; }
        .cookie-banner.show { display: block; }
        footer { background: var(--dark); color: white; padding: 40px; text-align: center; }
        footer a { color: #f39c12; margin: 0 10px; text-decoration: none; }
    </style>
</head>
<body>

    <header style="padding: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <nav style="display: flex; justify-content: space-between; max-width: 1200px; margin: auto;">
            <strong>🍽️ FoodLogistic</strong>
            <div>
                <a href="#serveis">Serveis</a>
                <a href="#contacte" style="margin-left: 20px;">Contacte</a>
            </div>
        </nav>
    </header>

    <section class="hero">
        <h1>Distribució intel·ligent d'aliments frescos</h1>
        <p>Logística eficient i sostenible per al sector alimentari.</p>
    </section>

    <footer class="footer">
        <p>© 2026 FoodLogistic</p>
        <div class="legal-links">
            <a href="avis-legal.html">Avís Legal</a>
            <a href="privacitat.html">Privacitat</a>
            <a href="cookies.html">Cookies</a>
        </div>
    </footer>

    <div id="cookieBanner" class="cookie-banner">
        <div style="max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
            <span>🍪 Utilitzem galetes per millorar la teva experiència.</span>
            <div>
                <button onclick="acceptAll()" class="btn">Acceptar Totes</button>
                <a href="cookies.html" style="color: white; margin-left: 15px; font-size: 0.9rem;">Configurar / Saber més</a>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            if (!localStorage.getItem('cookies_accepted')) {
                document.getElementById('cookieBanner').classList.add('show');
            }
        }
        function acceptAll() {
            localStorage.setItem('cookies_accepted', 'all');
            document.getElementById('cookieBanner').classList.remove('show');
        }
    </script>
</body>
</html>
